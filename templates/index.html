<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Splitter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c10; --panel: #13131a; --border: #232333;
  --accent: #c8ff57; --accent2: #57c8ff; --red: #ff5757;
  --text: #eeeef5; --muted: #5a5a78;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(200,255,87,.06) 1px, transparent 1px);
  background-size: 28px 28px; pointer-events: none; z-index: 0;
}
.wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; }

header { margin-bottom: 48px; }
h1 { font-size: clamp(40px,7vw,64px); font-weight: 800; line-height: .9; letter-spacing: -.04em; }
h1 em { font-style: normal; color: var(--accent); display: block; }
header p { margin-top: 14px; font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .06em; }

.card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 16px; }
.card-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}
.card-label::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }

.drop-zone {
  border: 2px dashed var(--border); border-radius: 10px; padding: 48px 20px;
  text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
  position: relative; background: rgba(255,255,255,.02);
}
.drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: rgba(200,255,87,.04); }
.drop-zone .icon { font-size: 36px; display: block; margin-bottom: 12px; }
.drop-zone h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.drop-zone p { font-family: var(--mono); font-size: 11px; color: var(--muted); }

#file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.file-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 8px;
  animation: fadeIn .2s ease; cursor: grab;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.file-row .fi { font-size: 18px; flex-shrink: 0; }
.file-row .fn { flex: 1; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-row .fs { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }
.file-row .rm { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
.file-row .rm:hover { color: var(--red); }
.file-row.dragging { opacity: .4; }
.file-row.drag-over { border-color: var(--accent); background: rgba(200,255,87,.06); }

.stats { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 14px; padding: 12px 16px; background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 8px; }
.stat label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; display: block; }
.stat span { font-size: 22px; font-weight: 700; color: var(--accent2); }

.settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:500px){ .settings-row { grid-template-columns: 1fr; } }
.field label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 6px; }
.input-wrap { display: flex; align-items: stretch; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: rgba(255,255,255,.03); transition: border-color .15s; }
.input-wrap:focus-within { border-color: var(--accent); }
.input-wrap input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 18px; font-weight: 600; padding: 11px 14px; min-width: 0; }
.input-unit { font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 0 12px; background: rgba(255,255,255,.03); border-left: 1px solid var(--border); display: flex; align-items: center; }

#run-btn {
  width: 100%; padding: 17px; background: var(--accent); border: none; border-radius: 10px;
  color: #000; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
  letter-spacing: .02em; cursor: pointer; transition: transform .1s, box-shadow .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
#run-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,255,87,.28); }
#run-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }

.prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.prog-title { font-weight: 700; font-size: 15px; }
.prog-pct { font-family: var(--mono); font-size: 13px; color: var(--accent); }
.prog-track { height: 5px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 99px; width: 0%; transition: width .4s ease; }
/* アップロード専用バー */
.up-track { height: 3px; background: rgba(255,255,255,.05); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
.up-fill { height: 100%; background: var(--accent2); border-radius: 99px; width: 0%; transition: width .3s ease; }

.log-box {
  background: rgba(0,0,0,.4); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; height: 160px; overflow-y: auto;
  font-family: var(--mono); font-size: 11px; line-height: 1.7; color: var(--muted);
}
.log-box .ok  { color: #7dff9e; }
.log-box .info{ color: var(--accent2); }
.log-box .err { color: var(--red); }

.result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; margin-bottom: 16px; }
.result-item {
  background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px; display: flex; flex-direction: column; gap: 5px;
  cursor: pointer; transition: all .15s; text-decoration: none; color: inherit;
}
.result-item:hover { border-color: var(--accent2); transform: translateY(-2px); }
.result-item .ri { font-size: 22px; }
.result-item .rn { font-size: 12px; font-weight: 700; word-break: break-all; }
.result-item .rs { font-family: var(--mono); font-size: 10px; color: var(--muted); }

.btn-zip {
  width: 100%; padding: 15px; border: 2px solid var(--accent2); border-radius: 10px;
  background: transparent; color: var(--accent2); font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-zip:hover { background: rgba(87,200,255,.08); transform: translateY(-2px); }
.btn-reset { margin-top: 10px; width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: color .15s, border-color .15s; }
.btn-reset:hover { color: var(--text); border-color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>PDF<em>SPLITTER</em></h1>
    <p>qpdf powered — サーバーサイド処理 / チャンクアップロード対応</p>
  </header>

  <div class="card" id="upload-card">
    <div class="card-label">Step 01 — PDFをアップロード</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".pdf" multiple>
      <span class="icon">📂</span>
      <h3>ドラッグ＆ドロップ</h3>
      <p>または クリックして選択 — 複数可・順番はドラッグで変更できます</p>
    </div>
    <div id="file-list"></div>
    <div class="stats" id="stats" style="display:none">
      <div class="stat"><label>ファイル数</label><span id="s-files">0</span></div>
      <div class="stat"><label>合計サイズ</label><span id="s-size">0 MB</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Step 02 — 分割設定</div>
    <div class="settings-row">
      <div class="field">
        <label>分割上限サイズ</label>
        <div class="input-wrap">
          <input type="number" id="split-size" value="200" min="1" max="10000">
          <span class="input-unit">MB</span>
        </div>
      </div>
      <div class="field">
        <label>ファイル名プレフィックス</label>
        <div class="input-wrap">
          <input type="text" id="prefix" value="split">
        </div>
      </div>
    </div>
  </div>

  <button id="run-btn" disabled><span>⚡</span><span>分割を実行する</span></button>

  <div class="card" id="progress-card" style="display:none;margin-top:16px">
    <div class="card-label">処理中</div>
    <div class="prog-header">
      <span class="prog-title" id="prog-title">アップロード中...</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <!-- アップロード進捗バー -->
    <div class="up-track"><div class="up-fill" id="up-fill"></div></div>
    <!-- 分割進捗バー -->
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="log-box" id="log-box"></div>
  </div>

  <div class="card" id="result-card" style="display:none;margin-top:16px">
    <div class="card-label">完了 — 出力ファイル</div>
    <div class="result-grid" id="result-grid"></div>
    <button class="btn-zip" id="btn-zip">📦 すべてZIPでダウンロード</button>
    <button class="btn-reset" id="btn-reset">🔄 最初からやり直す</button>
  </div>
</div>

<script>
const CHUNK_SIZE = 50 * 1024 * 1024; // 50MB per chunk

let fileList = [];
let currentJobId = null;
let pollTimer = null;

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const runBtn    = document.getElementById('run-btn');

// ── ファイル管理 ──────────────────────────────────────────────
function fmt(b) {
  if (b >= 1<<20) return (b/(1<<20)).toFixed(1)+' MB';
  if (b >= 1<<10) return (b>>10)+' KB';
  return b+' B';
}
function addFiles(fs) {
  [...fs].forEach(f => {
    if (!f.name.toLowerCase().endsWith('.pdf')) return;
    if (!fileList.find(x => x.name===f.name && x.size===f.size))
      fileList.push(f);
  });
  renderList();
}
function renderList() {
  const el = document.getElementById('file-list');
  el.innerHTML = '';
  fileList.forEach((f,i) => {
    const d = document.createElement('div');
    d.className = 'file-row'; d.draggable = true; d.dataset.i = i;
    d.innerHTML = `<span class="fi">📄</span>
      <span class="fn">${f.name}</span>
      <span class="fs">${fmt(f.size)}</span>
      <button class="rm" data-i="${i}">✕</button>`;
    el.appendChild(d);
  });
  el.querySelectorAll('.rm').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); fileList.splice(+b.dataset.i,1); renderList();
  }));
  // drag-to-reorder
  let dragIdx = null;
  el.querySelectorAll('.file-row').forEach(row => {
    row.addEventListener('dragstart', ()=>{ dragIdx=+row.dataset.i; row.classList.add('dragging'); });
    row.addEventListener('dragend', ()=>row.classList.remove('dragging'));
    row.addEventListener('dragover', e=>{ e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', ()=>row.classList.remove('drag-over'));
    row.addEventListener('drop', e=>{
      e.preventDefault(); row.classList.remove('drag-over');
      if (dragIdx!==null && dragIdx!==+row.dataset.i){
        const [item]=fileList.splice(dragIdx,1);
        fileList.splice(+row.dataset.i,0,item);
        renderList();
      }
    });
  });
  const stats = document.getElementById('stats');
  if (fileList.length){
    stats.style.display='flex';
    document.getElementById('s-files').textContent=fileList.length;
    document.getElementById('s-size').textContent=fmt(fileList.reduce((s,f)=>s+f.size,0));
    runBtn.disabled=false;
  } else {
    stats.style.display='none';
    runBtn.disabled=true;
  }
}

dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e=>{ e.preventDefault(); dropZone.classList.remove('over'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', ()=>{ addFiles(fileInput.files); fileInput.value=''; });

// ── チャンクアップロード ───────────────────────────────────────
async function uploadAllFiles(sessionId) {
  const total = fileList.reduce((s,f)=>s+f.size,0);
  let uploaded = 0;

  // file_order: サーバー上のファイル名リスト（処理順）
  const fileOrder = [];

  for (let fi=0; fi<fileList.length; fi++){
    const file = fileList[fi];
    const safeFilename = `${String(fi).padStart(4,'0')}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    fileOrder.push(safeFilename);

    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
    for (let ci=0; ci<totalChunks; ci++){
      const start = ci * CHUNK_SIZE;
      const blob  = file.slice(start, start + CHUNK_SIZE);
      const fd    = new FormData();
      fd.append('session_id',  sessionId);
      fd.append('file_index',  fi);
      fd.append('chunk_index', ci);
      fd.append('total_chunks',totalChunks);
      fd.append('filename',    safeFilename);
      fd.append('data',        blob, safeFilename);

      const res = await fetch('/api/upload_chunk', {method:'POST', body:fd});
      if (!res.ok) throw new Error(`アップロード失敗: ${file.name} chunk ${ci}`);

      uploaded += blob.size;
      const pct = uploaded / total * 100;
      document.getElementById('up-fill').style.width = pct + '%';
      document.getElementById('prog-pct').textContent = Math.round(pct) + '%';
      document.getElementById('prog-title').textContent =
        `アップロード中... ${fileList[fi].name} (${ci+1}/${totalChunks})`;
    }
  }
  return fileOrder;
}

// ── 実行 ──────────────────────────────────────────────────────
runBtn.addEventListener('click', async ()=>{
  const sizeMB = parseFloat(document.getElementById('split-size').value)||200;
  const prefix = document.getElementById('prefix').value.trim()||'split';
  const sessionId = crypto.randomUUID();

  runBtn.disabled=true;
  document.getElementById('progress-card').style.display='block';
  document.getElementById('result-card').style.display='none';
  document.getElementById('log-box').innerHTML='';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('up-fill').style.width='0%';
  document.getElementById('prog-pct').textContent='0%';

  try {
    // 1. チャンクアップロード
    const fileOrder = await uploadAllFiles(sessionId);
    logLine('info','✅ アップロード完了');
    document.getElementById('prog-title').textContent='分割処理中...';
    document.getElementById('up-fill').style.width='100%';

    // 2. 分割ジョブ開始
    const fd2 = new FormData();
    fd2.append('session_id', sessionId);
    fd2.append('size_mb',    sizeMB);
    fd2.append('prefix',     prefix);
    fd2.append('file_order', JSON.stringify(fileOrder));
    const r2 = await fetch('/api/finalize', {method:'POST', body:fd2});
    const d2 = await r2.json();
    if (!r2.ok) { logLine('err','❌ '+(d2.error||'エラー')); runBtn.disabled=false; return; }

    currentJobId = d2.job_id;
    pollStatus();

  } catch(e) {
    logLine('err','❌ '+e.message);
    runBtn.disabled=false;
  }
});

function pollStatus(){
  pollTimer = setInterval(async ()=>{
    const res  = await fetch(`/api/status/${currentJobId}`);
    const data = await res.json();

    // ログ描画
    const box = document.getElementById('log-box');
    box.innerHTML = data.log.map(l=>{
      const cls = l.startsWith('💾')||l.startsWith('✅') ? 'ok'
                : l.startsWith('❌') ? 'err' : 'info';
      return `<div class="${cls}">${esc(l)}</div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;

    document.getElementById('prog-fill').style.width  = data.progress+'%';
    document.getElementById('prog-pct').textContent   = data.progress+'%';

    if (data.status==='done'){
      clearInterval(pollTimer);
      document.getElementById('prog-title').textContent='✅ 完了！';
      showResults(data.output_files);
    } else if (data.status==='error'){
      clearInterval(pollTimer);
      document.getElementById('prog-title').textContent='❌ エラー';
      runBtn.disabled=false;
    }
  }, 800);
}

function showResults(files){
  const grid = document.getElementById('result-grid');
  grid.innerHTML='';
  files.forEach(name=>{
    const a = document.createElement('a');
    a.className='result-item';
    a.href=`/api/download/${currentJobId}/${name}`;
    a.download=name;
    a.innerHTML=`<span class="ri">📄</span><div class="rn">${name}</div>`;
    grid.appendChild(a);
  });
  document.getElementById('result-card').style.display='block';
  runBtn.disabled=false;
}

document.getElementById('btn-zip').addEventListener('click', ()=>{
  window.location.href=`/api/download_zip/${currentJobId}`;
});
document.getElementById('btn-reset').addEventListener('click', ()=>{
  fileList=[]; currentJobId=null;
  if(pollTimer) clearInterval(pollTimer);
  renderList();
  document.getElementById('progress-card').style.display='none';
  document.getElementById('result-card').style.display='none';
});

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function logLine(cls,msg){
  const box=document.getElementById('log-box');
  box.innerHTML+=`<div class="${cls}">${esc(msg)}</div>`;
  box.scrollTop=box.scrollHeight;
}
</script>
</body>
</html>
